<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════
       VARIABLES — modifica aquí para personalizar todo
       ═══════════════════════════════════════════════════ */
    :root {
      /* ─── IMAGEN DE FONDO ───────────────────────────────
         Cambia esta URL por la imagen que quieras usar.
         Funciona con cualquier imagen: oscura, clara, colorida.
         ──────────────────────────────────────────────────── */
      --bg-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80');

      /* ─── Glassmorphism ─── */
      --glass-bg:       rgba(255, 255, 255, 0.09);
      --glass-border:   rgba(255, 255, 255, 0.18);
      --glass-highlight:rgba(255, 255, 255, 0.30);
      --glass-blur:     28px;
      --glass-shadow:   0 32px 64px rgba(0, 0, 0, 0.40),
                        0  8px 16px rgba(0, 0, 0, 0.20);

      /* ─── Texto ─── */
      --text-primary:   #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-muted:     rgba(255, 255, 255, 0.35);

      /* ─── Inputs ─── */
      --input-bg:       rgba(255, 255, 255, 0.06);
      --input-border:   rgba(255, 255, 255, 0.14);
      --input-focus-bg: rgba(255, 255, 255, 0.10);
      --input-focus-border: rgba(255, 255, 255, 0.50);
      --label-idle:     rgba(255, 255, 255, 0.45);
      --label-active:   rgba(255, 255, 255, 0.80);

      /* ─── Botón ─── */
      --btn-bg:         #ffffff;
      --btn-text:       #0a0a0a;
      --btn-hover-bg:   rgba(255, 255, 255, 0.88);

      /* ─── Overlay del fondo ─── */
      --overlay-vignette: radial-gradient(
        ellipse at center,
        rgba(0,0,0,0.20) 0%,
        rgba(0,0,0,0.60) 100%
      );
      --overlay-linear: linear-gradient(
        160deg,
        rgba(0,0,0,0.30) 0%,
        rgba(0,0,0,0.55) 100%
      );

      /* ─── Espaciado y forma ─── */
      --card-radius:    18px;
      --input-radius:   10px;
      --btn-radius:     10px;
      --card-padding:   44px 40px;
      --transition:     0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }


    /* ─── Reset ──────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }


    /* ─── Fondo ──────────────────────────────────────── */
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow: hidden;
      position: relative;

      /* Imagen de fondo */
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Overlays dobles para contraste garantizado con cualquier imagen */
    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background: var(--overlay-vignette);
      z-index: 0;
    }

    body::after {
      background: var(--overlay-linear);
      z-index: 1;
    }


    /* ─── Card de vidrio ─────────────────────────────── */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: var(--card-padding);
      border-radius: var(--card-radius);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(1.6);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.6);

      /* Borde glassmorphism: más brillante arriba-izq, se desvanece abajo-der */
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-highlight);
      border-left-color: var(--glass-highlight);

      box-shadow: var(--glass-shadow);

      /* Micro-animación de entrada */
      animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }


    /* ─── Logo ───────────────────────────────────────── */
    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .login-logo-inner {
      /* Reemplaza este contenido por tu logo real */
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-primary);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      text-decoration: none;
    }

    .login-logo-icon {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-logo-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }


    /* ─── Cabecera ───────────────────────────────────── */
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.4px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
    }


    /* ─── Formulario ─────────────────────────────────── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }


    /* ─── Inputs con floating label ──────────────────── */
    .field {
      position: relative;
    }

    .field-input {
      width: 100%;
      height: 56px;
      padding: 20px 16px 8px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--input-radius);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 400;
      outline: none;
      transition:
        background var(--transition),
        border-color var(--transition),
        box-shadow var(--transition);
      appearance: none;
      -webkit-appearance: none;
    }

    .field-input:-webkit-autofill,
    .field-input:-webkit-autofill:hover,
    .field-input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(30, 40, 60, 0.85) inset;
      -webkit-text-fill-color: #ffffff;
      caret-color: #ffffff;
      transition: background 0s;
    }

    .field-input::placeholder {
      color: transparent; /* Oculta el placeholder — usamos floating label */
    }

    .field-input:hover {
      border-color: rgba(255, 255, 255, 0.25);
    }

    .field-input:focus {
      background: var(--input-focus-bg);
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
    }


    /* Floating label */
    .field-label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--label-idle);
      pointer-events: none;
      transform-origin: left center;
      transition:
        top        var(--transition),
        font-size  var(--transition),
        font-weight var(--transition),
        color      var(--transition),
        transform  var(--transition);
    }

    /* Cuando el input tiene foco O tiene contenido */
    .field-input:focus    ~ .field-label,
    .field-input:not(:placeholder-shown) ~ .field-label {
      top: 12px;
      transform: translateY(0) scale(0.78);
      transform-origin: left top;
      font-size: 0.9375rem; /* scale() maneja el tamaño visual */
      font-weight: 500;
      color: var(--label-active);
    }


    /* ─── Toggle de contraseña ───────────────────────── */
    .field-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color var(--transition);
    }

    .field-toggle:hover { color: var(--text-secondary); }
    .field-toggle:focus-visible {
      outline: 2px solid rgba(255,255,255,0.4);
      outline-offset: 2px;
    }

    .field-toggle svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .eye-off { display: none; }
    .eye-on  { display: block; }


    /* ─── Fila de opciones ───────────────────────────── */
    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }

    /* Checkbox "Recordarme" */
    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      user-select: none;
    }

    .remember-checkbox {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--input-border);
      border-radius: 4px;
      background: var(--input-bg);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background var(--transition), border-color var(--transition);
    }

    .remember-checkbox:checked {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 0.85);
    }

    .remember-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 4.5px;
      width: 5px;
      height: 8px;
      border: 2px solid #0a0a0a;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .remember-checkbox:focus-visible {
      outline: 2px solid rgba(255,255,255,0.4);
      outline-offset: 2px;
    }

    .forgot-link {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition);
    }

    .forgot-link:hover { color: var(--text-primary); }


    /* ─── Botón principal ────────────────────────────── */
    .btn-login {
      width: 100%;
      height: 52px;
      margin-top: 8px;
      padding: 0 24px;
      border: none;
      border-radius: var(--btn-radius);
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition:
        background  var(--transition),
        transform   var(--transition),
        box-shadow  var(--transition),
        opacity     var(--transition);
      position: relative;
      overflow: hidden;
    }

    /* Shimmer al hacer hover */
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255,255,255,0.35) 50%,
        transparent 70%
      );
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn-login:hover::after { transform: translateX(100%); }

    .btn-login:hover {
      background: var(--btn-hover-bg);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-login:focus-visible {
      outline: 2px solid rgba(255,255,255,0.6);
      outline-offset: 3px;
    }

    .btn-login:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      transition: transform var(--transition);
    }

    .btn-login:hover svg { transform: translateX(2px); }


    /* ─── Divisor ────────────────────────────────────── */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    .login-divider span {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }


    /* ─── Pie del card ───────────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 4px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .login-footer a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      transition: opacity var(--transition);
    }

    .login-footer a:hover { opacity: 0.75; }


    /* ─── Mensaje de error ───────────────────────────── */
    .login-error {
      display: none;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(255, 80, 80, 0.12);
      border: 1px solid rgba(255, 80, 80, 0.25);
      font-size: 0.8125rem;
      color: #ff9090;
      line-height: 1.5;
    }

    .login-error.visible { display: block; }


    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 480px) {
      :root {
        --card-padding: 32px 24px;
        --glass-blur: 20px;
      }

      .login-card { border-radius: 14px; }

      .login-title   { font-size: 1.3rem; }
      .login-options { flex-direction: column; align-items: flex-start; gap: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ─── Login Card ─── -->
  <div class="login-card" role="main">

    <!-- Logo -->
    <div class="login-logo">
      <a href="#" class="login-logo-inner">
        <!-- LOGO: Reemplaza este bloque por tu logo real.
             Puedes usar: <img src="logo.svg" alt="Mi empresa" height="32">
             o simplemente el nombre de tu empresa como texto. -->
        <div class="login-logo-icon">
          <svg viewBox="0 0 24 24">
            <polygon points="12,2 22,20 2,20"/>
          </svg>
        </div>
        <span>MiEmpresa</span>
      </a>
    </div>

    <!-- Cabecera -->
    <div class="login-header">
      <h1 class="login-title">Bienvenido de vuelta</h1>
      <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
    </div>

    <!-- Formulario -->
    <form class="login-form" id="loginForm" onsubmit="handleSubmit(event)" novalidate>

      <!-- Mensaje de error -->
      <div class="login-error" id="loginError" role="alert">
        Correo o contraseña incorrectos. Inténtalo de nuevo.
      </div>

      <!-- Campo: Correo -->
      <div class="field">
        <input
          class="field-input"
          type="email"
          id="email"
          name="email"
          placeholder="correo@ejemplo.com"
          autocomplete="email"
          required
        />
        <label class="field-label" for="email">Correo electrónico</label>
      </div>

      <!-- Campo: Contraseña -->
      <div class="field">
        <input
          class="field-input"
          type="password"
          id="password"
          name="password"
          placeholder="Tu contraseña"
          autocomplete="current-password"
          required
          style="padding-right: 48px;"
        />
        <label class="field-label" for="password">Contraseña</label>
        <!-- Botón para mostrar/ocultar contraseña -->
        <button
          type="button"
          class="field-toggle"
          id="togglePassword"
          aria-label="Mostrar contraseña"
          onclick="togglePasswordVisibility()"
        >
          <!-- Ojo abierto -->
          <svg class="eye-on" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Ojo cerrado -->
          <svg class="eye-off" viewBox="0 0 24 24">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Recordarme / Olvidé mi contraseña -->
      <div class="login-options">
        <label class="remember-label">
          <input class="remember-checkbox" type="checkbox" name="remember" />
          Recordarme
        </label>
        <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <!-- Botón principal -->
      <button class="btn-login" type="submit" id="submitBtn">
        <span>Iniciar sesión</span>
        <svg viewBox="0 0 24 24">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

      <!-- Divisor -->
      <div class="login-divider">
        <span>¿Aún no tienes cuenta?</span>
      </div>

      <!-- Pie -->
      <div class="login-footer">
        <a href="#">Crear una cuenta nueva →</a>
      </div>

    </form>
  </div>


  <!-- ─── JavaScript ─── -->
  <script>
    /* ══════════════════════════════════════════════════
       LÓGICA DEL FORMULARIO
       Conecta aquí tu sistema de autenticación real.
       ══════════════════════════════════════════════════ */

    /* Mostrar / ocultar contraseña */
    function togglePasswordVisibility() {
      const input  = document.getElementById('password');
      const toggle = document.getElementById('togglePassword');
      const eyeOn  = toggle.querySelector('.eye-on');
      const eyeOff = toggle.querySelector('.eye-off');

      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      eyeOn.style.display  = isHidden ? 'none'  : 'block';
      eyeOff.style.display = isHidden ? 'block' : 'none';
      toggle.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
    }

    /* Envío del formulario */
    function handleSubmit(event) {
      event.preventDefault();

      const btn   = document.getElementById('submitBtn');
      const error = document.getElementById('loginError');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      /* Ocultar error anterior */
      error.classList.remove('visible');

      /* Validación básica */
      if (!email || !password) return;

      /* Estado de carga */
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Ingresando…';

      /* ── REEMPLAZA ESTE BLOQUE con tu lógica real ──
         Por ejemplo, con Firebase:
           firebase.auth().signInWithEmailAndPassword(email, password)
             .then(() => window.location.href = 'dashboard.html')
             .catch(err => showError(err.message));
         ──────────────────────────────────────────── */
      console.log('Login:', { email, password });

      /* Demo: simula un intento (quitar en producción) */
      setTimeout(function () {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Iniciar sesión';
        /* Descomenta la siguiente línea para simular un error: */
        /* showError('Correo o contraseña incorrectos.'); */
      }, 1500);
    }

    /* Mostrar error en pantalla */
    function showError(message) {
      const error = document.getElementById('loginError');
      if (message) error.textContent = message;
      error.classList.add('visible');

      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Iniciar sesión';

      /* Shake suave en el card */
      const card = document.querySelector('.login-card');
      card.style.animation = 'none';
      card.offsetHeight; /* Forzar reflow */
      card.style.animation = 'shake 0.4s ease';
    }

    /* Recuperar contraseña */
    function handleForgotPassword(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (email) {
        alert('Si ' + email + ' está registrado, recibirás un correo con instrucciones.');
      } else {
        document.getElementById('email').focus();
        alert('Escribe tu correo primero y luego haz clic en "¿Olvidaste tu contraseña?"');
      }
    }
  </script>

  <style>
    /* Animación shake para errores */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
  </style>

</body>
</html>
