<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi cuenta – Elemsoft</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    /* ── Wrapper ── */
    .d { max-width: 940px; margin: 0 auto; padding: 4rem 2rem 8rem; }

    /* ── Header ── */
    .d-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
      padding: 2.4rem 0 2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 2.8rem;
    }
    .d-name {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700; letter-spacing: -0.5px;
      color: #f0f0f0; margin: 0 0 0.2rem;
    }
    .d-email {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; color: #555;
      letter-spacing: 0.04em;
    }
    .d-head-actions { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.2rem; }
    .d-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.55rem 1rem; text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12); color: #888;
      background: none; cursor: pointer;
      transition: color .18s, border-color .18s;
    }
    .d-btn:hover { color: #fff; border-color: rgba(255,255,255,0.35); }
    .d-btn.accent { background: rgba(255,255,255,0.92); color: #0a0a0a; border-color: transparent; }
    .d-btn.accent:hover { background: #fff; color: #0a0a0a; }

    /* ── Stats strip ── */
    .d-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.07);
      gap: 1px;
      margin-bottom: 3.2rem;
    }
    .d-stat {
      background: #0d0d0d;
      padding: 1.4rem 1.6rem;
    }
    .d-stat-n {
      font-size: 1.9rem; font-weight: 700;
      color: #f0f0f0; letter-spacing: -0.5px;
      line-height: 1; margin-bottom: 0.4rem;
    }
    .d-stat-n.sm { font-size: 1.1rem; padding-top: 0.4rem; }
    .d-stat-l {
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: #555; font-family: 'Space Mono', monospace;
    }
    .d-stat-sub { font-size: 0.75rem; color: #666; margin-top: 0.25rem; }

    /* ── Sección ── */
    .d-sec { margin-bottom: 3rem; }
    .d-sec-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.8rem;
    }
    .d-sec-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #666; margin: 0;
    }
    .d-sec-link {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: #555; text-decoration: none;
      transition: color .18s;
    }
    .d-sec-link:hover { color: #ddd; }
    .d-divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 1.2rem; }

    /* ── Tabla ── */
    .d-table { width: 100%; border-collapse: collapse; }
    .d-table th {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: #555; padding: 0 1rem 0.7rem; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .d-table td {
      padding: 0.95rem 1rem; font-size: 0.88rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      vertical-align: middle; color: #ccc;
    }
    .d-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .d-table .t-main { color: #eee; font-weight: 500; }
    .d-table .t-mono { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: #777; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.2rem 0.6rem;
    }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .badge-pending { color: #ffd04d; border: 1px solid rgba(255,200,0,.22); }
    .badge-pending::before { background: #ffd04d; }
    .badge-sched   { color: #8aaeff; border: 1px solid rgba(100,150,255,.22); }
    .badge-sched::before { background: #8aaeff; }
    .badge-done    { color: #5ddf8e; border: 1px solid rgba(50,200,100,.22); }
    .badge-done::before { background: #5ddf8e; }
    .badge-cancel  { color: #999; border: 1px solid rgba(255,255,255,.1); opacity: .6; }
    .badge-cancel::before { background: #666; }

    /* ── Cupones ── */
    .d-coupons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px; border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.07);
    }
    .d-coupon {
      background: #0d0d0d; padding: 1.6rem 1.8rem;
      position: relative; transition: background .18s;
    }
    .d-coupon:hover:not(.d-coupon--used) { background: #111; }
    .d-coupon--used { opacity: .3; pointer-events: none; }
    .d-coupon-used-tag {
      position: absolute; top: 1rem; right: 1rem;
      font-family: 'Space Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #555; border: 1px solid rgba(255,255,255,.08);
      padding: 0.15rem 0.5rem;
    }
    .d-coupon-pct {
      font-size: 2.5rem; font-weight: 700; color: #f0f0f0;
      letter-spacing: -1px; line-height: 1; margin-bottom: 0.3rem;
    }
    .d-coupon-desc { font-size: 0.8rem; color: #777; margin-bottom: 1.2rem; line-height: 1.5; }
    .d-coupon-sep { border-top: 1px dashed rgba(255,255,255,.12); margin-bottom: 1rem; }
    .d-coupon-code {
      font-family: 'Space Mono', monospace; font-size: 0.75rem;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      padding: 0.45rem 0.85rem; letter-spacing: 0.1em;
      cursor: pointer; user-select: all; color: #ccc;
      transition: background .18s;
    }
    .d-coupon-code:hover { background: rgba(255,255,255,.09); }
    .d-coupon-hint { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: #444; margin-top: 0.35rem; display: block; }
    .d-coupon-exp { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: #555; margin-top: 0.9rem; text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Ofertas ── */
    .d-offers {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px; border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.07);
    }
    .d-offer {
      background: #0d0d0d; padding: 1.8rem;
      display: flex; flex-direction: column;
      transition: background .18s;
    }
    .d-offer:hover { background: #111; }
    .d-offer-badge {
      font-family: 'Space Mono', monospace; font-size: 0.58rem;
      color: #5ddf8e; letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 0.7rem;
    }
    .d-offer-tag {
      font-family: 'Space Mono', monospace; font-size: 0.58rem;
      color: #555; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.07); padding: 0.15rem 0.6rem;
      margin-bottom: 1rem; align-self: flex-start;
    }
    .d-offer h3 { font-size: 0.98rem; font-weight: 600; color: #eee; margin: 0 0 0.45rem; }
    .d-offer p  { font-size: 0.82rem; color: #777; margin: 0 0 1.3rem; line-height: 1.6; flex: 1; }
    .d-offer-price { margin-bottom: 1.1rem; }
    .d-offer-price-new { font-size: 1.3rem; font-weight: 700; color: #f0f0f0; }
    .d-offer-price-old { font-size: 0.8rem; color: #444; text-decoration: line-through; margin-left: 0.5rem; }
    .d-offer-price-var { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
    .d-offer-cta {
      font-family: 'Space Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.55rem 1rem; border: 1px solid rgba(255,255,255,.14);
      color: #888; text-decoration: none; align-self: flex-start;
      transition: color .18s, border-color .18s;
    }
    .d-offer-cta:hover { color: #fff; border-color: rgba(255,255,255,.35); }
    .d-members-note {
      font-family: 'Space Mono', monospace; font-size: 0.65rem; color: #555;
      letter-spacing: 0.04em; margin: -0.3rem 0 1rem;
    }

    /* ── Estado vacío ── */
    .d-empty {
      padding: 3rem 1rem; text-align: center;
      color: #555; font-size: 0.84rem; line-height: 1.8;
      border: 1px dashed rgba(255,255,255,.07);
    }
    .d-empty a { color: #888; text-decoration: underline; text-underline-offset: 3px; }

    /* ── Loading ── */
    .d-loading { text-align: center; padding: 8rem 2rem; color: #555; }
    .d-loading span { display: block; font-size: 0.82rem; margin-top: 1rem; font-family: 'Space Mono', monospace; letter-spacing: 0.05em; }

    /* ── Nav logout ── */
    #btnNavLogout {
      font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: #666; background: none; border: 1px solid rgba(255,255,255,.1);
      padding: 0.4rem 0.9rem; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
      transition: color .18s, border-color .18s;
    }
    #btnNavLogout:hover { color: #fff; border-color: rgba(255,255,255,.3); }

    /* ── Warranty pill ── */
    .d-pill {
      font-family: 'Space Mono', monospace; font-size: 0.62rem;
      color: #666; border: 1px solid rgba(255,255,255,.07);
      padding: 0.15rem 0.55rem; letter-spacing: 0.04em;
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .d-stats { grid-template-columns: repeat(2, 1fr); }
      .d-head { flex-direction: column; }
      .d-table thead { display: none; }
      .d-table td { display: block; border: none; padding: 0.3rem 0.5rem; }
      .d-table tr { display: block; border-top: 1px solid rgba(255,255,255,.06); padding: 0.7rem 0.3rem; }
    }
  </style>
</head>

<div id="dashContent" class="d-loading">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
  <span>Cargando tu cuenta…</span>
</div>

<script src="main.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyAYUz0m5R_ncBFCMFXCOzcArEkQnbVYWGo",
    authDomain:        "elemsoftgt.firebaseapp.com",
    projectId:         "elemsoftgt",
    storageBucket:     "elemsoftgt.firebasestorage.app",
    messagingSenderId: "482757350889",
    appId:             "1:482757350889:web:3c45a31d75f6b319562778",
    measurementId:     "G-8MSTXNK08V"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  const OFERTAS = [
    { tag:'Solo miembros',    title:'Mantenimiento preventivo completo', desc:'Limpieza interna, cambio de pasta térmica y revisión general.',        priceNew:'Q180', priceOld:'Q220', href:'contacto.html' },
    { tag:'Oferta del mes',   title:'Una segunda vida para tu PC',       desc:'Upgrade de RAM + SSD con instalación incluida. Compatibilidad verificada.', priceNew:null,   priceOld:null,   href:'contacto.html' },
    { tag:'Exclusivo',        title:'Revisión y limpieza express',        desc:'Servicio en el día. Sin cita previa.',                               priceNew:'Q75',  priceOld:'Q100', href:'servicios.html' },
  ];

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'login.html'; return; }
    await cargar(user);
  });

  function logOut() { auth.signOut().then(() => window.location.href = 'login.html'); }

  function fechaVenc90() {
    const d = new Date(); d.setDate(d.getDate() + 90);
    return d.toLocaleDateString('es-GT', { day:'2-digit', month:'short', year:'numeric' }).replace('.','');
  }

  function fmtISO(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-').map(Number);
    if (!y || !m || !d) return iso;
    return new Date(y,m-1,d).toLocaleDateString('es-GT', { day:'2-digit', month:'short' }).replace('.','');
  }

  function proximaCita(citas, servicios) {
    const act = citas.filter(c => c.estado==='pendiente' || c.estado==='confirmada')
      .sort((a,b)=>(a.fechaPreferida||'').localeCompare(b.fechaPreferida||''));
    if (act.length) return { fecha: fmtISO(act[0].fechaPreferida), label: act[0].servicio||'Cita agendada' };
    const s = servicios.find(s=>s.estado==='sched');
    if (s) return { fecha: s.fecha||'—', label: s.servicio||'Servicio agendado' };
    return null;
  }

  async function cargar(user) {
    try {
      const uRef = db.collection('usuarios').doc(user.uid);
      const uSnap = await uRef.get();
      const tieneBonus = uSnap.exists && uSnap.data().cuponBienvenidaCreado === true;
      await uRef.set({ nombre: user.displayName||'', email: user.email, uid: user.uid }, { merge:true });
      if (!tieneBonus) {
        await uRef.collection('cupones').add({ descuento:'25%', descripcion:'En tu próximo mantenimiento completo', codigo:'BIENVENIDO25', vencimiento: fechaVenc90(), usado:false });
        await uRef.set({ cuponBienvenidaCreado:true }, { merge:true });
      }
      const [sSnap, cSnap, citSnap] = await Promise.all([
        uRef.collection('servicios').get(),
        uRef.collection('cupones').get(),
        db.collection('citas_rapidas').where('uid','==',user.uid).get(),
      ]);
      const servicios = sSnap.docs.map(d=>({id:d.id,...d.data()}));
      const cupones   = cSnap.docs.map(d=>({id:d.id,...d.data()}));
      const citas     = citSnap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>{
          const ta=a.creadoEn?.toMillis?.()||0, tb=b.creadoEn?.toMillis?.()||0;
          return tb-ta;
        });
      render(user, servicios, cupones, citas);
    } catch(err) {
      document.getElementById('dashContent').innerHTML = `
        <div style="max-width:560px;margin:5rem auto;padding:1.8rem 2rem;border:1px solid rgba(220,50,50,.2);background:rgba(220,50,50,.06);">
          <p style="color:#ff6b6b;font-size:0.8rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem;">Error al cargar</p>
          <p style="color:#ccc;font-size:.88rem;margin-bottom:.3rem;">${err.message}</p>
          <p style="color:#666;font-size:.78rem;">Código: <code style="color:#aaa;">${err.code||'—'}</code></p>
        </div>`;
    }
  }

  function render(user, servicios, cupones, citas) {
    const nombre      = user.displayName ? user.displayName.split(' ')[0] : 'Cliente';
    const email       = user.email;
    const miembro     = user.metadata.creationTime
      ? new Date(user.metadata.creationTime).toLocaleDateString('es-GT',{month:'short',year:'numeric'}).replace('.','')
      : '—';
    const doneSvcs    = servicios.filter(s=>s.estado==='done').length;
    const actCoupons  = cupones.filter(c=>c.usado!==true).length;
    const proxCita    = proximaCita(citas, servicios);

    document.getElementById('dashContent').innerHTML = `<div class="d">

      <!-- Header -->
      <div class="d-head">
        <div>
          <h1 class="d-name">${nombre}</h1>
          <span class="d-email">${email}</span>
        </div>
        <div class="d-head-actions">
          <a href="login.html" class="d-btn accent">Agendar cita →</a>
          <a href="contacto.html" class="d-btn">Cotizar</a>
          <button class="d-btn" onclick="logOut()">Salir</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="d-stats">
        <div class="d-stat">
          <div class="d-stat-n">${doneSvcs}</div>
          <div class="d-stat-l">Servicios</div>
          <div class="d-stat-sub">realizados</div>
        </div>
        <div class="d-stat">
          <div class="d-stat-n">${actCoupons}</div>
          <div class="d-stat-l">Cupones</div>
          <div class="d-stat-sub">disponibles</div>
        </div>
        <div class="d-stat">
          <div class="d-stat-n sm">${proxCita ? proxCita.fecha : '—'}</div>
          <div class="d-stat-l">Próxima cita</div>
          <div class="d-stat-sub">${proxCita ? proxCita.label : 'Sin citas'}</div>
        </div>
        <div class="d-stat">
          <div class="d-stat-n sm">${miembro}</div>
          <div class="d-stat-l">Miembro desde</div>
          <div class="d-stat-sub">cuenta activa</div>
        </div>
      </div>

      <!-- Mis citas -->
      <div class="d-sec">
        <div class="d-sec-head">
          <h2 class="d-sec-title">Mis citas</h2>
          <a href="login.html" class="d-sec-link">Agendar nueva →</a>
        </div>
        <div class="d-divider"></div>
        ${renderCitas(citas)}
      </div>

      <!-- Historial -->
      <div class="d-sec">
        <div class="d-sec-head">
          <h2 class="d-sec-title">Historial de servicios</h2>
          <a href="contacto.html" class="d-sec-link">Agendar →</a>
        </div>
        <div class="d-divider"></div>
        ${renderServicios(servicios)}
      </div>

      <!-- Cupones -->
      <div class="d-sec">
        <div class="d-sec-head">
          <h2 class="d-sec-title">Mis cupones</h2>
          <span class="d-sec-link">Clic en el código para copiarlo</span>
        </div>
        <div class="d-divider"></div>
        ${renderCupones(cupones)}
      </div>

      <!-- Ofertas -->
      <div class="d-sec">
        <div class="d-sec-head">
          <h2 class="d-sec-title">Ofertas exclusivas para ti</h2>
          <a href="servicios.html" class="d-sec-link">Ver servicios →</a>
        </div>
        <p class="d-members-note">Solo para miembros con cuenta Elemsoft.</p>
        <div class="d-divider"></div>
        <div class="d-offers">
          ${OFERTAS.map(o=>`
            <div class="d-offer">
              <span class="d-offer-badge">★ Solo miembros</span>
              <span class="d-offer-tag">${o.tag}</span>
              <h3>${o.title}</h3>
              <p>${o.desc}</p>
              <div class="d-offer-price">
                ${o.priceNew
                  ? `<span class="d-offer-price-new">${o.priceNew}</span><span class="d-offer-price-old">${o.priceOld}</span>`
                  : `<span class="d-offer-price-var">Precio según diagnóstico</span>`}
              </div>
              <a href="${o.href}" class="d-offer-cta">Cotizar →</a>
            </div>`).join('')}
        </div>
      </div>

    </div>`;
  }

  /* ── Estado badge ── */
  function badge(estado) {
    const map = { pendiente:'badge-pending', confirmada:'badge-sched', done:'badge-done', sched:'badge-sched', pending:'badge-pending', completada:'badge-done', cancelada:'badge-cancel' };
    const txt = { pendiente:'Pendiente', confirmada:'Confirmada', done:'Completado', sched:'Agendado', pending:'En proceso', completada:'Completada', cancelada:'Cancelada' };
    const cls = map[estado] || 'badge-pending';
    return `<span class="badge ${cls}">${txt[estado] || estado || '—'}</span>`;
  }

  /* ── Citas ── */
  function renderCitas(citas) {
    if (!citas.length) return `<div class="d-empty">Aún no tienes citas.<br><a href="login.html">Agenda una desde tu cuenta.</a></div>`;
    return `<table class="d-table">
      <thead><tr><th>Fecha</th><th>Servicio</th><th>Teléfono</th><th>Cupón</th><th>Estado</th></tr></thead>
      <tbody>${citas.map(c=>`<tr>
        <td class="t-mono">${fmtISO(c.fechaPreferida)}</td>
        <td class="t-main">${c.servicio||'—'}</td>
        <td class="t-mono">${c.telefono||'—'}</td>
        <td class="t-mono">${c.cupon||'—'}</td>
        <td>${badge(c.estado)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  /* ── Servicios ── */
  function renderServicios(servicios) {
    if (!servicios.length) return `<div class="d-empty">Aún no tienes servicios registrados.<br><a href="contacto.html">Agenda tu primera cita.</a></div>`;
    return `<table class="d-table">
      <thead><tr><th>Fecha</th><th>Servicio</th><th>Técnico</th><th>Estado</th><th>Garantía</th></tr></thead>
      <tbody>${servicios.map(s=>`<tr>
        <td class="t-mono">${s.fecha||'—'}</td>
        <td class="t-main">${s.servicio||'—'}</td>
        <td class="t-mono">${s.tecnico||'—'}</td>
        <td>${badge(s.estado)}</td>
        <td><span class="d-pill">${s.garantia||'—'}</span></td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  /* ── Cupones ── */
  function renderCupones(cupones) {
    if (!cupones.length) return `<div class="d-empty">Aún no tienes cupones.<br>¡Sigue usando nuestros servicios para ganar beneficios!</div>`;
    return `<div class="d-coupons">${cupones.map(c=>`
      <div class="d-coupon ${c.usado===true?'d-coupon--used':''}">
        ${c.usado===true?'<span class="d-coupon-used-tag">Usado</span>':''}
        <div class="d-coupon-pct">${c.descuento||'—'}</div>
        <div class="d-coupon-desc">${c.descripcion||''}</div>
        <div class="d-coupon-sep"></div>
        <span class="d-coupon-code" onclick="copiar(this,'${c.codigo||''}')">${c.codigo||'—'}</span>
        <span class="d-coupon-hint">Clic para copiar</span>
        <div class="d-coupon-exp">Válido hasta: ${c.vencimiento||'—'}</div>
      </div>`).join('')}</div>`;
  }

  function copiar(el, codigo) {
    const copy = t => { el.textContent=t; setTimeout(()=>el.textContent=codigo, 1600); };
    if (navigator.clipboard?.writeText) navigator.clipboard.writeText(codigo).then(()=>copy('¡Copiado!'));
    else {
      const t=document.createElement('textarea'); t.value=codigo; t.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
      copy('¡Copiado!');
    }
  }
</script>
</body>
</html>
